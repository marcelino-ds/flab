<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 280px;
      background: rgba(26, 26, 28, 0.95);
      backdrop-filter: blur(20px);
      color: #f5f5f7;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      user-select: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .hdr {
      padding: 16px 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .logo {
      width: 32px; height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, #0A84FF, #30D158);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
    }

    .brand { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    .tagline { font-size: 10px; color: #8e8e93; font-weight: 500; margin-top: 1px; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    .sec-label {
      font-size: 11px; font-weight: 600; color: #8e8e93;
      margin-bottom: 6px; padding-left: 2px;
    }

    textarea {
      width: 100%;
      background: rgba(44, 44, 46, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #f5f5f7;
      font-family: inherit; font-size: 12px;
      padding: 10px 12px; outline: none; resize: none; min-height: 64px;
      line-height: 1.4; transition: all 0.2s;
    }
    textarea:focus { border-color: #0A84FF; background: rgba(44, 44, 46, 0.9); box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2); }
    textarea::placeholder { color: #636366; }

    .send-btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: #0A84FF; color: #fff;
      font-family: inherit; font-weight: 600; font-size: 13px;
      cursor: pointer; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 16px rgba(10, 132, 255, 0.3);
    }
    .send-btn:hover { background: #0071E3; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(10, 132, 255, 0.4); }
    .send-btn:active { transform: translateY(1px); box-shadow: none; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .status { font-size: 11px; text-align: center; color: #8e8e93; min-height: 15px; font-weight: 500; }
    .status.err { color: #FF453A; }
    .status.ok { color: #32D74B; }
  </style>
</head>
<body>
  <div class="hdr">
    <div class="logo">✨</div>
    <div>
      <div class="brand">Prelab AI</div>
      <div class="tagline">LMS Batch Scraper</div>
    </div>
  </div>

  <div class="body">
    <div style="margin-bottom: 12px;">
      <div class="sec-label">Mode Operasi</div>
      <select id="runMode" style="width:100%; background:rgba(44,44,46,0.6); color:#fff; border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:10px 12px; font-size:12px; outline:none; transition: all 0.2s;">
        <option value="batch" style="background:#1a1a1c">Batch Screenshot (Tembak 10 Soal)</option>
        <option value="solve" style="background:#1a1a1c">Auto-Solver (Jawab per Soal + Next)</option>
      </select>
    </div>

    <div>
      <div class="sec-label">Prompt Tambahan</div>
      <textarea id="prompt" placeholder="Misal: Jawab soal ini dengan langkah dan rumus."></textarea>
    </div>

    <div style="margin-top: 4px;">
      <button class="send-btn" id="sendBtn">Mulai Proses</button>
    </div>
    
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
