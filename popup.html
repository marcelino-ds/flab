<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 280px;
      background: rgba(28, 28, 30, 0.9);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      color: #F5F5F7;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      user-select: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
    }

    html {
      background: transparent;
      border-radius: 12px;
    }

    .hdr {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .brand { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }

    .platform-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .platform-badge.ilab {
      background: rgba(50, 215, 75, 0.15);
      color: #32D74B;
      border: 1px solid rgba(50, 215, 75, 0.2);
    }
    .platform-badge.vclass {
      background: rgba(10, 132, 255, 0.15);
      color: #0A84FF;
      border: 1px solid rgba(10, 132, 255, 0.2);
    }
    .platform-badge.unknown {
      background: rgba(142, 142, 147, 0.15);
      color: #8E8E93;
      border: 1px solid rgba(142, 142, 147, 0.2);
    }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    .sec-label {
      font-size: 11px; font-weight: 500; color: #8E8E93;
      margin-bottom: 6px; padding-left: 2px;
      letter-spacing: 0.2px; text-transform: uppercase;
    }

    .info-box {
      background: rgba(255, 159, 10, 0.08);
      border: 1px solid rgba(255, 159, 10, 0.15);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11.5px;
      line-height: 1.5;
      color: rgba(255, 214, 138, 0.9);
    }

    textarea {
      width: 100%;
      background: rgba(118, 118, 128, 0.16);
      border: 1px solid transparent;
      border-radius: 8px;
      color: #fff;
      font-family: inherit; font-size: 13px;
      padding: 10px 12px; outline: none; resize: none;
      transition: all 0.2s ease;
      min-height: 64px; line-height: 1.4;
    }

    textarea:focus { 
      background: rgba(118, 118, 128, 0.24); 
      border-color: rgba(255, 255, 255, 0.1); 
    }
    textarea::placeholder { color: rgba(235, 235, 245, 0.3); }

    .send-btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      background: #EBEBF5; color: #1C1C1E;
      font-family: inherit; font-weight: 600; font-size: 13px;
      cursor: pointer; transition: all 0.2s ease;
    }
    .send-btn:hover { background: #FFFFFF; transform: scale(0.98); }
    .send-btn:active { transform: scale(0.96); opacity: 0.8; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .status { font-size: 11px; text-align: center; color: #8E8E93; min-height: 16px; font-weight: 500; margin-top: -6px; transition: color 0.2s; }
    .status.err { color: #FF6961; }
    .status.ok { color: #32D74B; }
  </style>
</head>
<body>
  <div class="hdr">
    <div class="brand">Prelab</div>
    <span class="platform-badge unknown" id="platformBadge">—</span>
  </div>

  <div class="body">
    <div id="infoBox" class="info-box" style="display:none;"></div>

    <div>
      <div class="sec-label">Prompt Modifikasi</div>
      <textarea id="prompt" placeholder="Opsional: Konteks tambahan..."></textarea>
    </div>

    <div style="margin-top: 4px;">
      <button class="send-btn" id="sendBtn">Mulai Proses</button>
    </div>
    
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
